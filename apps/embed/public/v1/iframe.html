<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Radio Milwaukee — Playlist Widget</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        /* Background is set inline at boot time, matching the resolved
           widget theme. This prevents the OS dark-mode canvas from
           bleeding through when the host iframe is taller than the
           widget content (Windows users were getting a black band
           below the widget). */
      }
      [data-rmke-widget] {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="rmke-mount" data-rmke-widget></div>
    <script>
      (function () {
        var mount = document.getElementById("rmke-mount");
        var params = new URLSearchParams(location.search);
        params.forEach(function (value, name) {
          // Accept both kebab-case (?max-items=20) and camelCase (?maxItems=20)
          // URL param names. dataset keys are camelCase, so normalize either form.
          var datasetKey = name.replace(/-([a-z])/g, function (_, c) {
            return c.toUpperCase();
          });
          mount.dataset[datasetKey] = value;
        });

        // Resolve the theme + apply matching body bg so empty space
        // inside the iframe doesn't fall through to the OS canvas
        // color. Token values mirror DESIGN.md: light = #F7F3EE
        // (warm off-white), dark = #0E0F11 (warm near-black).
        var theme = mount.dataset.theme || "auto";
        var resolved =
          theme === "auto"
            ? matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : theme;
        document.body.style.background = resolved === "dark" ? "#0E0F11" : "#F7F3EE";

        // If theme is "auto" we keep the body bg in sync with the
        // user's OS preference flipping mid-session.
        if (theme === "auto" && window.matchMedia) {
          var mq = matchMedia("(prefers-color-scheme: dark)");
          if (mq.addEventListener) {
            mq.addEventListener("change", function (e) {
              document.body.style.background = e.matches ? "#0E0F11" : "#F7F3EE";
            });
          }
        }
      })();
    </script>
    <script type="module" src="./widget.js"></script>
  </body>
</html>
