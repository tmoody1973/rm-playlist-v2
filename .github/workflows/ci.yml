name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck + Lint + Test + Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Stubs so Convex codegen doesn't fail without a deployment key. The
      # _generated/ files are committed, so CI doesn't need live codegen —
      # but any code that reads `process.env.NEXT_PUBLIC_CONVEX_URL` during
      # module init wants a value. Stubs are fine because CI never calls
      # the network.
      NEXT_PUBLIC_CONVEX_URL: "https://ci-stub.convex.cloud"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_ci-stub"
      CLERK_SECRET_KEY: "sk_test_ci-stub"

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (all workspaces)
        run: bun run typecheck

      - name: Lint
        run: bunx eslint apps/web/app packages/ingestion/src packages/convex/convex src/trigger

      - name: Format check
        run: bun run format:check

      - name: Test (all workspaces)
        run: bun run test

      - name: Assert adapter fixtures ≥ 10 per adapter (CEO-accepted scope)
        run: |
          for adapter in spinitron sgmetadata icy; do
            count=$(find "packages/ingestion/test/fixtures/${adapter}" -name "*.json" -type f | wc -l | tr -d ' ')
            echo "::notice::${adapter}: ${count} fixtures"
            if [ "$count" -lt 10 ]; then
              echo "::error::${adapter} has ${count} fixtures, need ≥ 10"
              exit 1
            fi
          done
