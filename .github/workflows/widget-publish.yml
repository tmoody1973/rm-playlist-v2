name: Widget publish (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - "apps/embed/**"
      - "packages/types/**"
      - ".github/workflows/widget-publish.yml"
  workflow_dispatch: # manual trigger from the Actions UI

permissions:
  contents: read
  deployments: write

concurrency:
  group: widget-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build + deploy widget bundle
    runs-on: ubuntu-latest
    timeout-minutes: 8
    environment:
      name: production
      url: https://rm-playlist-v2-embed.pages.dev

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun --filter='@rm/embed' run typecheck

      # VITE_CONVEX_URL is a public URL (appears in every widget bundle),
      # not a secret. Hardcoded here so the build actually includes the
      # Convex client; without it, Vite's static-replace + terser DCE
      # strip the whole getConvexClient() path down to a throwing stub,
      # the build "succeeds" but the widget is non-functional at runtime
      # AND trivially under any size budget. See vite.config.ts comment.
      - name: Build widget bundle + enforce size ceiling
        run: bun --filter='@rm/embed' run build:check
        env:
          VITE_CONVEX_URL: https://precise-fish-444.convex.cloud

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: d1fd8b8b5235d89303faf11170314041
          command: pages deploy apps/embed/dist --project-name=rm-playlist-v2-embed --branch=main
