name: Trigger.dev deploy

# Auto-deploys the Trigger.dev project (`proj_zfhgrpvwpifgfcubbvyg`) to the
# prod environment whenever `main` advances. Mirror of convex-deploy.yml —
# same trigger, same SHA-pinning, same gating on CI success.
#
# Why this exists: until 2026-04-27 there was no auto-deploy for Trigger
# tasks. The dev worker only ran while a developer's terminal had
# `bunx trigger.dev@latest dev` open. When that terminal closed,
# polling stopped and Convex `plays` froze. Prod had never been
# deployed. This workflow closes that gap so polling runs on
# Trigger.dev's cloud 24/7.
#
# Triggered on `workflow_run` after CI (ci.yml) succeeds on main, so we
# only deploy passing code. Path filtering is intentionally omitted —
# task code can transitively change via `packages/ingestion`,
# `packages/enrichment`, `@rm/types`, `bun.lock`, etc.
#
# Requires `TRIGGER_ACCESS_TOKEN` repo secret. Generate from the
# Trigger.dev dashboard (Profile → Personal Access Tokens) and add it
# under Settings → Secrets and variables → Actions.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: # manual trigger from the Actions UI if needed

permissions:
  contents: read

concurrency:
  # Serialize deploys — Trigger handles concurrent deploys, but cancelling
  # in-progress reduces confusion if several commits land fast.
  group: trigger-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Trigger.dev tasks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run when CI succeeded (or when manually dispatched).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          # Pin to the SHA of the triggering CI run so we deploy the exact
          # commit that passed — not any later commits that may have
          # landed during this workflow's queue time.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy to Trigger.dev
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
        run: |
          if [ -z "${TRIGGER_ACCESS_TOKEN}" ]; then
            echo "::error::TRIGGER_ACCESS_TOKEN secret is not set. Generate a Personal Access Token from the Trigger.dev dashboard (Profile → Personal Access Tokens) and add it to repo secrets, then re-run."
            exit 1
          fi
          bunx trigger.dev@latest deploy
